<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ดูดวงจากวันเกิด</title>
  <style>

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, #001d3d, #003566, #0077b6, #00b4d8 150%);
      color: #fff;
      padding: 20px;
    }

    .stars {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:

        radial-gradient(1px 1px at 30% 40%, rgba(255,255,255,0.4), transparent),
        radial-gradient(2px 2px at 55% 20%, rgba(144,224,239,0.5), transparent),
        radial-gradient(1px 1px at 75% 60%, rgba(255,255,255,0.3), transparent),
        radial-gradient(2px 2px at 90% 10%, rgba(144,224,239,0.6), transparent),
        radial-gradient(1px 1px at 20% 80%, rgba(255,255,255,0.25), transparent),
        radial-gradient(2px 2px at 60% 75%, rgba(144,224,239,0.4), transparent),
        radial-gradient(1px 1px at 85% 85%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1px 1px at 45% 55%, rgba(255,255,255,0.2), transparent),
        radial-gradient(3px 3px at 5% 50%, rgba(0,180,216,0.4), transparent),
        radial-gradient(3px 3px at 95% 30%, rgba(0,180,216,0.5), transparent),
        radial-gradient(2px 2px at 35% 5%, rgba(144,224,239,0.7), transparent),
        radial-gradient(1px 1px at 70% 45%, rgba(255,255,255,0.3), transparent);
    }

    .container {
      position: relative; z-index: 1;
      max-width: 700px; margin: 0 auto;
    }

    header {
      text-align: center; margin-bottom: 36px;
    }

    header .moon { font-size: 60px; margin-bottom: 8px; }

    header h1 {
      font-size: 2.2rem; font-weight: 700;
      background: linear-gradient(90deg, #90e0ef, #00b4d8, #0096c7);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p { color: #ccc; margin-top: 6px; font-size: 1rem; }

    .card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 28px;
      backdrop-filter: blur(10px);
      margin-bottom: 24px;
    }

    .form-group { margin-bottom: 20px; }

    label {
      display: block; margin-bottom: 8px;
      font-weight: 600; color: #90e0ef; font-size: 1rem;
    }

    input[type="date"], input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      font-family: 'Sarabun', sans-serif;
      outline: none;
      transition: border-color 0.3s;
    }

    input[type="date"]:focus, input[type="text"]:focus {
      border-color: #00b4d8;
    }

    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #0077b6, #00b4d8);
      border: none; border-radius: 14px;
      color: #fff; font-size: 1.1rem; font-weight: 700;
      font-family: 'Sarabun', sans-serif;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(0,119,182,0.5);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,180,216,0.7);
    }

    .btn:active { transform: translateY(0); }

    #result { display: none; }

    .result-header {
      text-align: center; margin-bottom: 24px;
    }

    .zodiac-emoji { font-size: 70px; }

    .result-name {
      font-size: 1.8rem; font-weight: 700; margin: 8px 0 4px;
      color: #90e0ef;
    }

    .result-sub { color: #cae9ff; font-size: 0.95rem; }

    .grid-2 {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 14px; margin-bottom: 14px;
    }

    @media (max-width: 480px) {
      .grid-2 { grid-template-columns: 1fr; }
    }

    .info-box {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px; padding: 16px;
      text-align: center;
    }

    .info-box .label {
      font-size: 0.8rem; color: #aaa; margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: 0.05em;
    }

    .info-box .value {
      font-size: 1.15rem; font-weight: 700; color: #90e0ef;
    }

    .info-box .icon { font-size: 1.6rem; margin-bottom: 4px; }

    .section-title {
      font-size: 1.1rem; font-weight: 700;
      color: #90e0ef; margin-bottom: 14px;
      border-left: 4px solid #00b4d8; padding-left: 12px;
    }

    .fortune-text {
      line-height: 1.9; color: #e8e8e8; font-size: 0.98rem;
    }

    .lucky-row {
      display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px;
    }

    .lucky-chip {
      padding: 6px 16px;
      border-radius: 999px;
      font-size: 0.9rem; font-weight: 600;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .bar-row { margin: 8px 0; }

    .bar-label {
      display: flex; justify-content: space-between;
      font-size: 0.9rem; margin-bottom: 4px; color: #ccc;
    }

    .bar-bg {
      background: rgba(255,255,255,0.1);
      border-radius: 999px; height: 8px; overflow: hidden;
    }

    .bar-fill {
      height: 100%; border-radius: 999px;
      background: linear-gradient(90deg, #0077b6, #00b4d8);
      transition: width 1s ease;
    }

    .tag-row { display: flex; flex-wrap: wrap; gap: 8px; }

    .tag {
      background: rgba(0,180,216,0.15);
      border: 1px solid rgba(0,180,216,0.4);
      border-radius: 999px; padding: 4px 14px;
      font-size: 0.88rem; color: #90e0ef;
    }

    .divider {

      margin: 20px 0;
    }

    .compatibility { display: flex; gap: 10px; flex-wrap: wrap; }

    .compat-item {
      flex: 1; min-width: 100px;
      background: rgba(0,180,216,0.1);
      border: 1px solid rgba(0,180,216,0.2);

      border-radius: 12px;
      color: #fff; font-size: 0.95rem; font-weight: 600;
      font-family: 'Sarabun', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
    }

    .share-btn:hover { background: rgba(0,180,216,0.28); }
  </style>
</head>

<div class="stars"></div>

</div>

const CHINESE_ZODIAC = ['ชวด (หนู) 🐭', 'ฉลู (วัว) 🐮', 'ขาล (เสือ) 🐯', 'เถาะ (กระต่าย) 🐰', 'มะโรง (งูใหญ่) 🐲', 'มะเส็ง (งู) 🐍', 'มะเมีย (ม้า) 🐴', 'มะแม (แพะ) 🐐', 'วอก (ลิง) 🐒', 'ระกา (ไก่) 🐔', 'จอ (หมา) 🐕', 'กุน (หมู) 🐖'];

const DAYS = ['อาทิตย์', 'จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์', 'เสาร์'];
const DAY_COLORS = ['แดง', 'เหลือง', 'ชมพู', 'เขียว', 'ส้ม', 'ฟ้า', 'ม่วง'];
const DAY_EMOJI = ['☀️', '🌙', '🔴', '💚', '⚡', '💎', '🪐'];

function getZodiac(month, day) {
  const md = month * 100 + day;
  if (md >= 1222 || md <= 119) return ZODIACS[0];  // มังกร
  if (md <= 218) return ZODIACS[1];   // กุมภ์
  if (md <= 320) return ZODIACS[2];   // มีน
  if (md <= 419) return ZODIACS[3];   // เมษ
  if (md <= 520) return ZODIACS[4];   // พฤษภ
  if (md <= 620) return ZODIACS[5];   // เมถุน
  if (md <= 722) return ZODIACS[6];   // กรกฎ
  if (md <= 822) return ZODIACS[7];   // สิงห์
  if (md <= 922) return ZODIACS[8];   // กันย์
  if (md <= 1022) return ZODIACS[9];  // ตุล
  if (md <= 1121) return ZODIACS[10]; // พิจิก
  return ZODIACS[11]; // ธนู
}

function getChineseZodiac(year) {
  return CHINESE_ZODIAC[(year - 4) % 12];
}

function getLifeNumber(dateStr) {
  const digits = dateStr.replace(/-/g, '');
  let sum = digits.split('').reduce((a, b) => a + parseInt(b), 0);
  while (sum > 9) {
    sum = sum.toString().split('').reduce((a, b) => a + parseInt(b), 0);
  }
  return sum;
}

function formatThaiDate(date) {
  const d = date.getDate();
  const m = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน',
             'กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'][date.getMonth()];
  const y = date.getFullYear() + 543;
  return `${d} ${m} พ.ศ. ${y}`;
}

function getCompatEmoji(sym) {
  const z = ZODIACS.find(z => z.emoji === sym);
  return z ? `${z.emoji} ${z.name}` : sym;
}

function colorStyle(colorName) {
  const map = {
    'แดง': '#ef4444', 'แดงเข้ม': '#991b1b', 'ส้ม': '#f97316',
    'เหลือง': '#eab308', 'เขียว': '#22c55e', 'เขียวทะเล': '#0d9488',
    'เขียวอ่อน': '#86efac', 'ฟ้า': '#3b82f6', 'ฟ้าอ่อน': '#bfdbfe',
    'น้ำเงิน': '#1d4ed8', 'ม่วง': '#a855f7', 'ม่วงอ่อน': '#e9d5ff',
    'ชมพู': '#ec4899', 'ขาว': '#f3f4f6', 'ดำ': '#374151',
    'เทา': '#9ca3af', 'น้ำตาล': '#78350f', 'ทอง': '#f59e0b',
    'เงิน': '#d1d5db', 'ครีม': '#fef3c7', 'มะรุม': '#4d7c0f',
  };
  return map[colorName] || '#888';
}

function calculate() {
  const dateVal = document.getElementById('birthDate').value;
  if (!dateVal) { alert('กรุณากรอกวันเกิด'); return; }

  const date = new Date(dateVal);
  const month = date.getMonth() + 1;
  const day = date.getDate();
  const year = date.getFullYear();
  const dow = date.getDay();
  const name = document.getElementById('nameInput').value.trim();

  const zodiac = getZodiac(month, day);
  const chineseZ = getChineseZodiac(year);
  const lifeNum = getLifeNumber(dateVal);
  const dayName = DAYS[dow];
  const dayColor = DAY_COLORS[dow];
  const dayEmoji = DAY_EMOJI[dow];

  document.getElementById('zodiacEmoji').textContent = zodiac.emoji;
  document.getElementById('zodiacName').textContent =
    (name ? `${name} — ` : '') + `ราศี${zodiac.name}`;
  document.getElementById('zodiacSub').textContent =
    `${zodiac.en} | ${formatThaiDate(date)} | วัน${dayName}`;

  document.getElementById('chineseZodiac').textContent = chineseZ;
  document.getElementById('birthDayName').textContent = `วัน${dayName} ${dayEmoji}`;
  document.getElementById('lifeNumber').textContent = lifeNum;
  document.getElementById('element').textContent = zodiac.element;

  // Fortune texts
  document.getElementById('fortuneText').textContent = zodiac.fortune;
  document.getElementById('careerText').textContent = zodiac.career;
  document.getElementById('moneyText').textContent = zodiac.money;
  document.getElementById('loveText').textContent = zodiac.love;
  document.getElementById('healthText').textContent = zodiac.health;

  // Energy bars
  const eb = document.getElementById('energyBars');
  eb.innerHTML = '';
  const bars = [
    { label: '💼 การงาน', val: zodiac.energy.work },
    { label: '💰 การเงิน', val: zodiac.energy.money },
    { label: '❤️ ความรัก', val: zodiac.energy.love },
    { label: '💪 สุขภาพ', val: zodiac.energy.health },

  bars.forEach(b => {
    eb.innerHTML += `
      <div class="bar-row">
        <div class="bar-label"><span>${b.label}</span><span>${b.val}%</span></div>
        <div class="bar-bg"><div class="bar-fill" style="width:0%" data-val="${b.val}"></div></div>
      </div>`;
  });

  // Lucky numbers
  const allNums = [...zodiac.lucky.numbers];
  if (!allNums.includes(lifeNum)) allNums.push(lifeNum);
  document.getElementById('luckyNumbers').innerHTML = allNums.map(n =>
    `<span class="lucky-chip" style="background:rgba(0,180,216,0.2);border-color:rgba(0,180,216,0.5)">${n}</span>`
  ).join('');

  // Lucky colors (include day color)
  const colors = [...zodiac.lucky.colors];
  if (!colors.includes(dayColor)) colors.unshift(dayColor);
  document.getElementById('luckyColors').innerHTML = colors.map(c =>
    `<span class="lucky-chip" style="background:${colorStyle(c)}22;border-color:${colorStyle(c)};color:#fff">${c}</span>`
  ).join('');

  // Personality tags
  const allTraits = [...zodiac.traits, `วัน${dayName}`];
  document.getElementById('personalityTags').innerHTML = allTraits.map(t =>
    `<span class="tag">${t}</span>`
  ).join('');

  // Compatibility
  document.getElementById('compatibility').innerHTML = zodiac.compat.map(sym => {
    const z2 = ZODIACS.find(z => z.emoji === sym);
    return z2 ? `<div class="compat-item"><div class="ci">${z2.emoji}</div><div class="cn">ราศี${z2.name}</div></div>` : '';
  }).join('');

  // Show result
  document.getElementById('formCard').style.display = 'none';
  document.getElementById('result').style.display = 'block';

  // Animate bars after render
  setTimeout(() => {
    document.querySelectorAll('.bar-fill').forEach(el => {
      el.style.width = el.dataset.val + '%';
    });
  }, 100);

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetForm() {
  document.getElementById('formCard').style.display = 'block';
  document.getElementById('result').style.display = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
